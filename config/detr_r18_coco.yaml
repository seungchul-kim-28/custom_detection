defaults:
  - base/base
  - _self_

base:
  dataset:
    batch_size: 1
    num_workers: 0
    transforms: ddd
    num_classes: 80
  transforms:
    Resize
    ToTensor

model:
  name: DETR
  
  # Backbone Config
  backbone_name: resnet18
  
  # Transformer Config
  num_heads: 8
  num_enc_layers: 6
  num_dec_layers: 6
  dim_ffn: 512
  embed_dims: 256
  drop_rate: 0.1
  num_queries: 100
  use_aux: True


criterion:
  name: DETRCriterion
  cls_weight: 0.1
  box_weight: 0.1
  iou_weight: 0.1

optim:
  optimizer: Adam
  learning_rate: 1e-5
  scheduler:

runtime:
  epoch: 10
  