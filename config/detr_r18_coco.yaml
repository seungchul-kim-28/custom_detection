defaults:
  - base/base
  - _self_

base:
  dataset:
    batch_size: 2
    num_workers: 0
    transforms: ddd
    num_classes: 80
    reshape_size: [640, 640]

model:
  name: DETR
  
  # Backbone Config
  backbone_name: resnet18
  
  # Transformer Config
  num_heads: 8
  num_enc_layers: 6
  num_dec_layers: 6
  dim_ffn: 2048
  embed_dims: 512
  drop_rate: 0.1
  num_queries: 100
  use_aux: True
  num_pos_feat: 256 # embed_dims / 2

matcher:
  name: HungarianMatcher
  cost_class: 1
  cost_bbox: 5
  cost_giou: 2

criterion:
  name: DETRCriterion
  loss_name: [labels, boxes]
  cls_weight: 0.1
  box_weight: 0.1
  iou_weight: 0.1

optim:
  optimizer: Adam
  learning_rate: 1e-5
  scheduler:

runtime:
  epoch: 10
  